<script>
        const API_BASE_URL = 'https://localhost:8443';

        document.addEventListener('DOMContentLoaded', async function() {
            const accessToken = sessionStorage.getItem('access_token');
            if (!accessToken) {
                // Not logged in: instantly redirect
                window.location.href = '/login.html';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/auth/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.status !== 200) {
                    throw new Error("Unauthorized");
                }

                const user = await response.json();
                
                // Populate Profile fields dynamically
                const fullnameElem = document.getElementById('user-fullname');
                const emailElem = document.getElementById('user-email');
                const roleElem = document.getElementById('user-role');

                if (fullnameElem) fullnameElem.textContent = user.full_name || 'Anonymous User';
                if (emailElem) emailElem.textContent = user.email;
                if (roleElem) roleElem.textContent = `${user.role.toUpperCase()} ✨`;

                // Unhide the page contents gracefully
                const bodyContent = document.getElementById('body-content');
                if (bodyContent) {
                    bodyContent.classList.remove('opacity-0');
                }

            } catch (err) {
                console.error("Session verification failed:", err);
                sessionStorage.clear();
                window.location.href = '/login.html';
            }
        });

        // Logout listener
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async function() {
                const accessToken = sessionStorage.getItem('access_token');
                const refreshToken = sessionStorage.getItem('refresh_token');

                if (!accessToken || !refreshToken) {
                    sessionStorage.clear();
                    window.location.href = '/login.html';
                    return;
                }

                try {
                    await fetch(`${API_BASE_URL}/api/v1/auth/logout`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${accessToken}`
                        },
                        body: JSON.stringify({ refresh_token: refreshToken })
                    });
                } catch (err) {
                    console.error("Logout request failed:", err);
                } finally {
                    sessionStorage.clear();
                    window.location.href = '/login.html';
                }
            });
        }

        // Micro-interaction for active scaling
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.97)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
