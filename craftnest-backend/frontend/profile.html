<div class="absolute -bottom-1 -right-1 bg-primary text-on-primary p-1 rounded-full shadow-sm">

</div>

<div class="font-headline-md text-primary">45</div>
<div class="font-label-sm text-on-surface-variant uppercase">Saved</div>
</div>
<div class="py-4 border-b border-outline-variant/20 md:border-b-0 md:border-r">
<div class="font-headline-md text-primary">8</div>
<div class="font-label-sm text-on-surface-variant uppercase">Reviews</div>
</div>
<div class="py-4">
<div class="font-headline-md text-primary">2.4k</div>
<div class="font-label-sm text-on-surface-variant uppercase">Followers</div>
</div>
</div>
<button class="w-full max-w-md bg-primary-container hover:bg-primary text-on-primary-container hover:text-on-primary font-label-sm uppercase py-4 rounded-full transition-all active:scale-[0.98]">

</section>
<!-- Main Content Tabs -->

</button>
<button class="flex items-center gap-2 pb-4 px-2 border-b-2 border-transparent text-on-surface-variant hover:text-on-background transition-all">
<span class="material-symbols-outlined">favorite</span>

<button class="flex items-center gap-2 pb-4 px-2 border-b-2 border-transparent text-on-surface-variant hover:text-on-background transition-all">
<span class="material-symbols-outlined">explore</span>

</button>

<!-- Active Tab Content: Order History -->
<section class="max-w-4xl mx-auto" id="order-history">
    <div class="animate-pulse bg-surface-container/30 p-6 rounded-xl space-y-4">
        <div class="h-6 bg-surface-container rounded w-1/4"></div>
        <div class="h-20 bg-surface-container rounded"></div>
    </div>
</section>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container-low/95 backdrop-blur-md shadow-[0_-4px_16px_rgba(74,69,62,0.08)] rounded-t-xl">
    <div onclick="window.location.href='home.html'" class="flex flex-col items-center justify-center text-secondary rounded-xl px-4 py-1.5 cursor-pointer">
        <span class="material-symbols-outlined">home</span>
        <span class="font-label-caps text-[10px] mt-0.5">Home</span>
    </div>
    <div onclick="window.location.href='category.html'" class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 cursor-pointer">
        <span class="material-symbols-outlined">category</span>
        <span class="font-label-caps text-[10px] mt-0.5">Category</span>
    </div>
    <div onclick="window.location.href='reels.html'" class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 cursor-pointer">
        <span class="material-symbols-outlined">play_circle</span>
        <span class="font-label-caps text-[10px] mt-0.5">Reels</span>
    </div>
    <div onclick="window.location.href='profile.html'" class="flex flex-col items-center justify-center text-primary px-4 py-1.5 cursor-pointer">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
        <span class="font-label-caps text-[10px] mt-0.5">Profile</span>
    </div>
</nav>

<script>
        const API_BASE_URL = window.location.origin;

        function formatStatusBadge(status) {
            let bg, text, label;
            switch(status) {
                case 'awaiting_payment':
                case 'pending':
                    bg = 'bg-amber-50 border-amber-200';
                    text = 'text-amber-700';
                    label = 'Awaiting Payment';
                    break;
                case 'paid_offline':
                    bg = 'bg-amber-50 border-amber-200';
                    text = 'text-amber-700';
                    label = 'Paid Offline';
                    break;
                case 'processing':
                    bg = 'bg-blue-50 border-blue-200';
                    text = 'text-blue-700';
                    label = 'Processing';
                    break;
                case 'shipped':
                    bg = 'bg-indigo-50 border-indigo-200';
                    text = 'text-indigo-700';
                    label = 'Shipped';
                    break;
                case 'delivered':
                    bg = 'bg-green-50 border-green-200';
                    text = 'text-green-700';
                    label = 'Delivered';
                    break;
                case 'cancelled':
                    bg = 'bg-gray-100 border-gray-200';
                    text = 'text-gray-600';
                    label = 'Cancelled';
                    break;
                case 'refunded':
                    bg = 'bg-gray-100 border-gray-200';
                    text = 'text-gray-600';
                    label = 'Refunded';
                    break;
                default:
                    bg = 'bg-gray-50 border-gray-200';
                    text = 'text-gray-700';
                    label = status;
            }
            return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border ${bg} ${text}">${label}</span>`;
        }

        async function fetchLatestOrder(token) {
            const container = document.getElementById('order-history');
            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/orders?page=1&page_size=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error("Failed to load order preview.");

                const data = await response.json();
                
                if (data.items.length === 0) {
                    container.innerHTML = `
                        <div class="bg-surface-container-low rounded-xl border border-outline-variant/30 p-8 text-center">
                            <span class="material-symbols-outlined text-4xl text-outline mb-2">shopping_bag</span>
                            <h3 class="font-headline-md text-xl mb-1">No orders yet</h3>
                            <p class="text-secondary text-sm mb-4">Your order history is empty.</p>
                            <button onclick="window.location.href='category.html'" class="bg-primary text-white text-xs font-semibold uppercase tracking-wider py-2 px-6 rounded-full hover:opacity-90 transition-all">Explore Crafts</button>
                        </div>
                    `;
                    return;
                }

                const order = data.items[0];
                const shortId = order.id.substring(order.id.length - 8);
                const totalVal = (order.total_paise / 100).toLocaleString('en-IN');
                const itemsCount = order.items.reduce((sum, item) => sum + item.quantity, 0);
                const titleStr = order.items[0]?.title_snapshot || "Handcrafted Art";

                container.innerHTML = `
                    <div class="bg-surface-container-low rounded-xl border border-outline-variant/30 overflow-hidden shadow-sm transition-all hover:shadow-md">
                        <div class="p-6 md:p-10 flex flex-col md:flex-row gap-8">
                            <div class="w-full md:w-40 h-40 flex-shrink-0 bg-surface-container-high rounded-lg overflow-hidden flex items-center justify-center border border-outline-variant/20">
                                <span class="material-symbols-outlined text-primary text-5xl">filter_vintage</span>
                            </div>
                            <div class="flex-grow">
                                <div class="flex flex-wrap justify-between items-start gap-4 mb-6">
                                    <div>
                                        <h3 class="font-headline-md text-2xl text-on-background mb-2 truncate max-w-sm">${titleStr}</h3>
                                        <p class="text-sm text-on-surface-variant flex items-center gap-2">
                                            Status: ${formatStatusBadge(order.status)}
                                        </p>
                                    </div>
                                    <div class="text-right">
                                        <p class="font-label-sm text-on-surface-variant uppercase mb-1">Latest Order #${shortId}</p>
                                        <p class="font-headline-md text-xl text-on-background">₹${totalVal}</p>
                                    </div>
                                </div>
                                <div class="text-xs text-on-surface-variant mb-6">
                                    Contains ${itemsCount} ${itemsCount === 1 ? 'item' : 'items'}. Placed on ${new Date(order.created_at).toLocaleDateString('en-IN', {day: 'numeric', month: 'short', year: 'numeric'})}
                                </div>
                                <div class="flex flex-col sm:flex-row gap-4">
                                    <button onclick="window.location.href='orders.html'" class="flex-grow border border-outline text-on-surface font-label-sm uppercase py-3.5 rounded-full hover:bg-surface-container transition-colors text-xs font-semibold">View All Orders</button>
                                    <button onclick="window.location.href='orders-detail.html?id=${order.id}'" class="flex-grow bg-primary text-on-primary font-label-sm uppercase py-3.5 rounded-full hover:opacity-90 transition-colors text-xs font-semibold">Order Details</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch(e) {
                console.error("Latest order fetch failed:", e);
                container.innerHTML = `
                    <div class="bg-surface-container-low rounded-xl border border-outline-variant/30 p-8 text-center text-secondary text-sm">
                        Failed to load order preview. <button onclick="window.location.reload()" class="underline text-primary">Retry</button>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const accessToken = sessionStorage.getItem('access_token');
            if (!accessToken) {
                // Not logged in: instantly redirect
                window.location.href = '/login.html';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/auth/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.status !== 200) {
                    throw new Error("Unauthorized");
                }

                const user = await response.json();
                
                // Populate Profile fields dynamically
                const fullnameElem = document.getElementById('user-fullname');
                const emailElem = document.getElementById('user-email');
                const roleElem = document.getElementById('user-role');

                if (fullnameElem) fullnameElem.textContent = user.full_name || 'Anonymous User';
                if (emailElem) emailElem.textContent = user.email;
                if (roleElem) roleElem.textContent = `${user.role.toUpperCase()} ✨`;

                // Fetch latest order preview
                await fetchLatestOrder(accessToken);

                // Unhide the page contents gracefully
                const bodyContent = document.getElementById('body-content');
                if (bodyContent) {
                    bodyContent.classList.remove('opacity-0');
                }

            } catch (err) {
                console.error("Session verification failed:", err);
                sessionStorage.clear();
                window.location.href = '/login.html';
            }
        });

        // Logout listener
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async function() {
                const accessToken = sessionStorage.getItem('access_token');
                const refreshToken = sessionStorage.getItem('refresh_token');

                if (!accessToken || !refreshToken) {
                    sessionStorage.clear();
                    window.location.href = '/login.html';
                    return;
                }

                try {
                    await fetch(`${API_BASE_URL}/api/v1/auth/logout`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${accessToken}`
                        },
                        body: JSON.stringify({ refresh_token: refreshToken })
                    });
                } catch (err) {
                    console.error("Logout request failed:", err);
                } finally {
                    sessionStorage.clear();
                    window.location.href = '/login.html';
                }
            });
        }

        // Micro-interaction for active scaling
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.97)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
