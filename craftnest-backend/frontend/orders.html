<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="/frontend/styles.css" rel="stylesheet">
    
    
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>My Orders | CraftNest</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts -->
    
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    
    <!-- Material Symbols -->
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#a8b48e",
                        "on-surface-variant": "#45483f",
                        "surface-bright": "#fff8f1",
                        "surface-container-low": "#faf2e9",
                        "surface-container": "#f4ede3",
                        "primary": "#B8456A",
                        "surface-variant": "#e9e1d8",
                        "outline-variant": "#c6c7bb",
                        "outline": "#76786e",
                        "background": "#FAF7F2",
                        "surface-tint": "#576242",
                        "tertiary": "#C9974A",
                        "on-surface": "#2D2420",
                        "surface": "#FAF7F2",
                        "secondary": "#7A8C6E",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "gutter": "24px",
                        "unit": "8px",
                        "container-max": "1200px",
                        "margin-desktop": "80px"
                    },
                    "fontFamily": {
                        "headline-md": ["Fraunces", "serif"],
                        "headline-lg": ["Fraunces", "serif"],
                        "body-md": ["Lora", "sans-serif"],
                        "body-lg": ["Lora", "sans-serif"],
                        "label-sm": ["Lora", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #fff8f1; color: #1e1b15; }
        h1, h2, h3, .font-headline { font-family: 'EB Garamond', serif; color: #1e1b15; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    


    <style>
        :root {
            --color-cream: #FAF7F2;
            --color-ink: #2D2420;
            --color-rose: #B8456A;
            --color-gold: #C9974A;
            --color-sage: #7A8C6E;
        }
        body {
            font-family: 'Lora', Georgia, serif;
            background-color: var(--color-cream);
            color: var(--color-ink);
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: 'Fraunces', 'Times New Roman', serif;
        }
    </style>

</head>
<body class="min-h-screen opacity-0 transition-opacity duration-300 flex flex-col justify-between" id="body-content">
    
    <div>
        <!-- Top Navigation -->
        <nav class="sticky top-0 z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 px-margin-mobile md:px-margin-desktop py-4 flex justify-between items-center">
            <div class="h-8 flex items-center gap-2 cursor-pointer" onclick="window.location.href='home.html'">
                <span class="material-symbols-outlined text-primary text-2xl">filter_vintage</span>
                <span class="font-headline-lg text-on-background text-2xl" style="font-family: 'EB Garamond', serif;">CraftNest</span>
            </div>
            <div class="flex gap-4 items-center">
                <a class="text-secondary hover:text-primary transition-colors text-sm font-semibold uppercase tracking-wider hidden md:block" href="home.html">Home</a>
                <a class="text-secondary hover:text-primary transition-colors text-sm font-semibold uppercase tracking-wider hidden md:block" href="category.html">Categories</a>
                <a class="text-secondary hover:text-primary transition-colors text-sm font-semibold uppercase tracking-wider hidden md:block" href="profile.html">Profile</a>
                <button id="logout-btn" class="p-2 hover:bg-surface-container rounded-full transition-colors flex items-center justify-center" title="Logout">
                    <span class="material-symbols-outlined text-on-surface text-2xl hover:text-error transition-colors">logout</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-12">
            <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
                <div>
                    <h1 class="font-headline-lg text-4xl mb-2">My Purchases</h1>
                    <p class="text-on-surface-variant text-sm">Review your order history, tracking codes, and status updates.</p>
                </div>
                <button onclick="window.location.href='profile.html'" class="inline-flex items-center gap-2 border border-outline text-on-surface py-2 px-6 rounded-full font-semibold text-xs uppercase tracking-wider hover:bg-surface-container transition-all self-start md:self-auto">
                    <span class="material-symbols-outlined text-[16px]">arrow_back</span> Back to Profile
                </button>
            </header>

            <!-- Error Banner -->
            <div id="error-banner" class="hidden bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl mb-8 flex items-start gap-3">
                <span class="material-symbols-outlined text-red-600 shrink-0">error</span>
                <p id="error-message" class="text-sm"></p>
            </div>

            <!-- Orders Container -->
            <div class="bg-surface-container-lowest rounded-xl border border-outline-variant/30 overflow-hidden shadow-sm">
                <!-- Desktop Table Headers -->
                <div class="hidden md:grid grid-cols-5 gap-4 px-6 py-4 bg-surface-container/30 border-b border-outline-variant/30 text-xs font-bold uppercase tracking-wider text-on-surface-variant">
                    <div>Order ID</div>
                    <div>Date Placed</div>
                    <div>Status</div>
                    <div class="text-right">Total</div>
                    <div class="text-right">Items</div>
                </div>

                <!-- Rows List -->
                <div id="orders-list" class="divide-y divide-outline-variant/30">
                    <!-- Skeleton Loader -->
                    <div class="animate-pulse p-6 space-y-4">
                        <div class="h-6 bg-surface-container rounded w-1/3"></div>
                        <div class="h-4 bg-surface-container rounded w-1/2"></div>
                    </div>
                </div>
            </div>

            <!-- Load More Button -->
            <div class="text-center mt-10">
                <button id="load-more-btn" class="hidden bg-primary-container text-on-primary-container hover:bg-primary hover:text-white py-3 px-8 rounded-full font-semibold text-sm uppercase tracking-widest transition-all active:scale-[0.98] shadow-sm">
                    Load More
                </button>
            </div>
        </main>
    </div>

    <!-- Simple Footer -->
    <footer class="border-t border-outline-variant/30 py-10 bg-surface-container-low text-center mt-12">
        <p class="text-xs text-on-surface-variant font-medium tracking-widest uppercase">© 2026 CraftNest Artisan Studio</p>
    </footer>

    <!-- BottomNavBar (Mobile Only) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container-low/95 backdrop-blur-md shadow-[0_-4px_16px_rgba(74,69,62,0.08)] rounded-t-xl">
        <div onclick="window.location.href='home.html'" class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 cursor-pointer">
            <span class="material-symbols-outlined">home</span>
            <span class="font-label-caps text-[10px] mt-0.5" style="font-size: 10px;">Home</span>
        </div>
        <div onclick="window.location.href='category.html'" class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 cursor-pointer">
            <span class="material-symbols-outlined">category</span>
            <span class="font-label-caps text-[10px] mt-0.5" style="font-size: 10px;">Category</span>
        </div>
        <div onclick="window.location.href='profile.html'" class="flex flex-col items-center justify-center text-primary px-4 py-1.5 cursor-pointer">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
            <span class="font-label-caps text-[10px] mt-0.5" style="font-size: 10px;">Profile</span>
        </div>
    </nav>

    <script>
        const API_BASE_URL = "https://localhost:8443";
        let currentPage = 1;
        const pageSize = 10;
        let totalItems = 0;

        function checkAuth() {
            const token = sessionStorage.getItem('access_token');
            if (!token) {
                window.location.href = 'login.html';
                return null;
            }
            return token;
        }

        function formatStatusBadge(status) {
            let bg, text, label;
            switch(status) {
                case 'awaiting_payment':
                case 'pending':
                    bg = 'bg-amber-50 border-amber-200';
                    text = 'text-amber-700';
                    label = 'Awaiting Payment';
                    break;
                case 'paid_offline':
                    bg = 'bg-amber-50 border-amber-200';
                    text = 'text-amber-700';
                    label = 'Paid Offline';
                    break;
                case 'processing':
                    bg = 'bg-blue-50 border-blue-200';
                    text = 'text-blue-700';
                    label = 'Processing';
                    break;
                case 'shipped':
                    bg = 'bg-indigo-50 border-indigo-200';
                    text = 'text-indigo-700';
                    label = 'Shipped';
                    break;
                case 'delivered':
                    bg = 'bg-green-50 border-green-200';
                    text = 'text-green-700';
                    label = 'Delivered';
                    break;
                case 'cancelled':
                    bg = 'bg-gray-100 border-gray-200';
                    text = 'text-gray-600';
                    label = 'Cancelled';
                    break;
                case 'refunded':
                    bg = 'bg-gray-100 border-gray-200';
                    text = 'text-gray-600';
                    label = 'Refunded';
                    break;
                default:
                    bg = 'bg-gray-50 border-gray-200';
                    text = 'text-gray-700';
                    label = status;
            }
            return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border ${bg} ${text}">${label}</span>`;
        }

        async function loadOrders(page = 1, append = false) {
            const token = checkAuth();
            if (!token) return;

            const errorBanner = document.getElementById('error-banner');
            const errorMsg = document.getElementById('error-message');
            const ordersList = document.getElementById('orders-list');
            const loadMoreBtn = document.getElementById('load-more-btn');

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/orders?page=${page}&page_size=${pageSize}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    sessionStorage.clear();
                    window.location.href = 'login.html';
                    return;
                }

                if (!response.ok) {
                    throw new Error(`Failed to load orders (${response.status})`);
                }

                const data = await response.json();
                totalItems = data.total;

                if (!append) {
                    ordersList.innerHTML = '';
                }

                if (data.items.length === 0 && !append) {
                    ordersList.innerHTML = `
                        <div class="text-center py-16 px-6">
                            <span class="material-symbols-outlined text-4xl text-outline mb-3">shopping_bag</span>
                            <h3 class="font-headline-md text-xl mb-1">No orders yet</h3>
                            <p class="text-secondary text-sm mb-6">You haven't placed any orders yet. Visit our shop to find beautiful crafts!</p>
                            <button onclick="window.location.href='category.html'" class="bg-primary text-white py-2 px-6 rounded-full font-semibold text-xs uppercase tracking-wider hover:opacity-90 transition-all">Start Shopping</button>
                        </div>
                    `;
                    loadMoreBtn.classList.add('hidden');
                    return;
                }

                data.items.forEach(order => {
                    const shortId = order.id.substring(order.id.length - 8);
                    const formattedDate = new Date(order.created_at).toLocaleDateString('en-IN', {
                        day: 'numeric',
                        month: 'short',
                        year: 'numeric'
                    });
                    const totalVal = (order.total_paise / 100).toLocaleString('en-IN');
                    const itemsCount = order.items.reduce((sum, item) => sum + item.quantity, 0);

                    // Row structure
                    const row = document.createElement('div');
                    row.className = "grid grid-cols-2 md:grid-cols-5 gap-4 px-6 py-5 hover:bg-surface-container/20 transition-all cursor-pointer items-center border-b border-outline-variant/10";
                    row.onclick = () => {
                        window.location.href = `orders-detail.html?id=${order.id}`;
                    };

                    row.innerHTML = `
                        <!-- Order ID -->
                        <div class="font-semibold text-primary">
                            <span class="md:hidden text-[10px] text-on-surface-variant block uppercase tracking-wider font-bold mb-1">Order ID</span>
                            #${shortId}
                        </div>
                        
                        <!-- Date -->
                        <div class="text-sm text-secondary">
                            <span class="md:hidden text-[10px] text-on-surface-variant block uppercase tracking-wider font-bold mb-1">Date Placed</span>
                            ${formattedDate}
                        </div>

                        <!-- Status Badge -->
                        <div>
                            <span class="md:hidden text-[10px] text-on-surface-variant block uppercase tracking-wider font-bold mb-1">Status</span>
                            ${formatStatusBadge(order.status)}
                        </div>

                        <!-- Total Price -->
                        <div class="text-right font-bold text-on-surface text-base md:text-sm">
                            <span class="md:hidden text-[10px] text-on-surface-variant block uppercase tracking-wider font-bold mb-1 text-right">Total</span>
                            ₹${totalVal}
                        </div>

                        <!-- Items Count -->
                        <div class="text-right text-sm text-on-surface-variant">
                            <span class="md:hidden text-[10px] text-on-surface-variant block uppercase tracking-wider font-bold mb-1 text-right">Items</span>
                            ${itemsCount} ${itemsCount === 1 ? 'item' : 'items'}
                        </div>
                    `;
                    ordersList.appendChild(row);
                });

                currentPage = page;

                // Toggle load more button visibility
                const loadedCount = ordersList.children.length;
                if (loadedCount < totalItems) {
                    loadMoreBtn.classList.remove('hidden');
                } else {
                    loadMoreBtn.classList.add('hidden');
                }

            } catch (err) {
                console.error("Error loading orders:", err);
                errorMsg.textContent = err.message || "Failed to load orders. Please try again.";
                errorBanner.classList.remove('hidden');
                if (!append) {
                    ordersList.innerHTML = `<div class="p-6 text-center text-secondary text-sm">Failed to load content.</div>`;
                }
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            const token = checkAuth();
            if (token) {
                const bodyContent = document.getElementById('body-content');
                if (bodyContent) bodyContent.classList.remove('opacity-0');
                loadOrders(1);
            }

            // Load more event listener
            document.getElementById('load-more-btn').addEventListener('click', () => {
                loadOrders(currentPage + 1, true);
            });

            // Logout event listener
            document.getElementById('logout-btn')?.addEventListener('click', () => {
                sessionStorage.clear();
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
